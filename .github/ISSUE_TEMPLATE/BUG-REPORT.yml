name: 🪲 Bug report
description: Report bugs and errors
title: "[BUG] "
labels: ["bug"]
assignees:
  - tech5g5g
body:
  - type: checkboxes
    attributes:
      label: "I have checked:"
      options:
        - label: This is not a duplicate of another issue
          required: true
        - label: This is not an feature/background removal request
          required: true
  - type: textarea
    attributes:
      label: What happened?
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    attributes:
      label: To reproduce
      description: Steps to reproduce the bug.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: input
    attributes:
      label: Mica Visual Studio version
      description: The version of Mica Visual Studio you are using.
      placeholder: "2.2"
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Edition
      description: Which edition of Visual Studio are you using?
      options:
        - Community
        - Professional
        - Enterprise
        - Other
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Channel
      description: Which Visual Studio channel are you on?
      options:
        - Release
        - Insiders
        - Other
    validations:
      required: true
  - type: input
    attributes:
      label: Visual Studio version
      description: The version of Visual Studio you are using.
      placeholder: "18.4.0"
    validations:
      required: true
  - type: textarea
    attributes:
      label: Addtional context
      description: Any other context about the problem.
    validations:
      required: false
      
